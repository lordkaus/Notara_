name: Android Release CI

on:
  push:
    branches: [ "teste", "new-features" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "teste" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE }}" | base64 --decode > app/release-key.jks

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        RELEASE_STORE_FILE: release-key.jks
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Notara_Release_APK
        path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/new-features'
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Notara_Release_APK

      - name: Set Release Info
        id: release_info
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/new-features" ]]; then
            echo "tag_name=preview-build-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "title=Pre-release (Preview) - Build ${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "title=Release Official ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.title }}
          files: "**/*.apk"
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.release_info.outputs.prerelease == 'true' }}
